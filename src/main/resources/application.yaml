spring:
  application:
    name: medsoft

  datasource:
    url: jdbc:postgresql://postgres:5432/auth_db
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8443
  ssl:
    enabled: true
    key-store: file:/app/certs/keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: medsoft

logging:
  level:
    org.springframework.security: DEBUG

app:
  crypto:
    key: ${APP_CRYPTO_KEY:default-secret-key-123}