<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-8 rounded shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6">Register</h1>

    <form th:action="@{/register}" method="post" class="space-y-4">
        <div>
            <label class="block mb-1">Login</label>
            <input type="text" name="login" class="w-full border rounded px-3 py-2"/>
        </div>
        <div>
            <label class="block mb-1">Password</label>
            <input type="password" name="password" class="w-full border rounded px-3 py-2"/>
        </div>
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Register
        </button>
    </form>

    <div class="mt-4 text-green-600" th:text="${message}"></div>
    <div class="mt-4 text-red-600" th:text="${error}"></div>

    <div class="mt-4">
        <a href="/login" class="text-blue-500 hover:underline">Go to Login</a>
    </div>
</div>
</body>
</html>
