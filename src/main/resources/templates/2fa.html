<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>2FA Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">Two-Factor Authentication</h1>

    <form method="post" class="space-y-4">
        <div>
            <label class="block mb-1">Enter Code</label>
            <input type="text" name="code"
                   placeholder="123456"
                   class="w-full border rounded px-3 py-2 text-center text-lg tracking-widest"/>
        </div>

        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
            Verify
        </button>
    </form>

    <div class="mt-4 text-red-600 text-center" th:text="${error}"></div>

</div>

</body>
</html>
