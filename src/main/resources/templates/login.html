<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="/css/tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-8 rounded shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6">Login</h1>
    <form th:action="@{/auth/login}" method="post" class="space-y-4">
        <input type="text" name="login" placeholder="Login" class="w-full p-2 border rounded">
        <input type="password" name="password" placeholder="Password" class="w-full p-2 border rounded">
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Login</button>
    </form>
    <p class="mt-4 text-sm text-gray-600">No account? <a th:href="@{/register}" class="text-blue-500">Register</a></p>
</div>
</body>
</html>
